<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM Asociados | Liderazgo Legal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0b; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>
    <section class="relative min-h-screen w-full flex items-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(17,24,39,1)_0%,rgba(0,0,0,1)_100%)]"></div>
        </div>

        <div class="container mx-auto px-6 z-10 grid lg:grid-cols-2 gap-12 items-center">
            <div class="space-y-8">
                <div class="flex items-center gap-2 text-[#C5A059] uppercase tracking-[0.3em] text-xs font-semibold">
                    <span>Prestigio • Estrategia • Resultados</span>
                </div>

                <h1 class="text-5xl md:text-7xl font-serif text-white leading-tight">
                    Liderazgo Legal <br> 
                    <span class="italic font-light text-[#C5A059]">Sin Concesiones.</span>
                </h1>

                <p class="text-gray-400 text-lg md:text-xl max-w-xl font-light leading-relaxed">
                    En MM Asociados transformamos la complejidad jurídica en ventajas competitivas. 
                    Arquitectura legal diseñada para los líderes que definen el mercado.
                </p>

                <div class="flex flex-wrap gap-4 pt-4">
                    <button class="px-8 py-4 bg-[#C5A059] text-black font-bold uppercase tracking-widest text-sm hover:bg-white transition-all duration-500">
                        Consultoría Senior
                    </button>
                    <button class="px-8 py-4 border border-white/20 text-white font-bold uppercase tracking-widest text-sm hover:bg-white/10 transition-all duration-500">
                        Nuestras Áreas
                    </button>
                </div>
            </div>

            <div class="relative hidden lg:block">
                <div class="absolute -top-10 -left-10 z-20 p-6 backdrop-blur-xl bg-white/5 border border-white/10 rounded-sm shadow-2xl">
                    <p class="text-[#C5A059] font-serif text-2xl">+25 Años</p>
                    <p class="text-gray-400 text-[10px] tracking-widest uppercase font-bold">Defendiendo Corporativos</p>
                </div>
                
                <div class="relative overflow-hidden grayscale border-l border-[#C5A059]/30">
                    <img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf?auto=format&fit=crop&q=80&w=1000" 
                         alt="Ejecutivo" 
                         class="w-full h-[600px] object-cover opacity-60">
                </div>
            </div>
        </div>
    </section>
</body>
</html>
